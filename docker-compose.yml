services:
  postgres:
    image: postgres:16-alpine
    container_name: bookit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookit
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
    ports:
      - "5432:5432"
    volumes:
      - bookit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U bookit -d bookit
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bookit_postgres_data:
